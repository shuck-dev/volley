# Auto-sync re-runs installHooks() on every git command, and 2.1.x refuses to
# write while core.hooksPath is set locally — printing "Skipping hook sync" on
# every invocation. Disable it; run `lefthook install` manually after edits here.
no_auto_install: true

output:
  - summary
  - success
  - failure
  - execution_out
  - skips

commit-msg:
  commands:
    check-format:
      run: ./scripts/ci/check_commit_msg.sh {1}

pre-push:
  commands:
    branch-name:
      run: ./scripts/ci/check_branch_name.sh

pre-commit:
  piped: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --no-banner --config=.gitleaks.toml
    codespell:
      exclude:
        - "addons/**"
      run: codespell {staged_files}
    gdformat:
      glob: "*.gd"
      exclude:
        - "addons/**"
      run: gdformat {staged_files}
      stage_fixed: true
    gdlint:
      glob: "*.gd"
      exclude:
        - "addons/**"
      run: gdlint {staged_files}
    gut:
      glob: "*.gd"
      exclude:
        - "addons/**"
      run: ./scripts/ci/run_gut.sh
    pip-audit:
      glob: "requirements-dev.txt"
      run: pip-audit --requirement requirements-dev.txt --strict
