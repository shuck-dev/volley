output:
  - summary
  - success
  - failure
  - execution_out
  - skips

prepare-commit-msg:
  commands:
    ticket-prefix:
      run: ./scripts/ci/prepend_ticket_prefix.sh {1} {2}

pre-commit:
  piped: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --no-banner
    codespell:
      exclude:
        - "addons/**"
      run: codespell {staged_files}
    gdformat:
      glob: "*.gd"
      exclude:
        - "addons/**"
      run: gdformat {staged_files}
      stage_fixed: true
    gdlint:
      glob: "*.gd"
      exclude:
        - "addons/**"
      run: gdlint {staged_files}
    gut:
      glob: "*.gd"
      exclude:
        - "addons/**"
      run: ./scripts/ci/run_gut.sh
    pip-audit:
      glob: "requirements-dev.txt"
      run: pip-audit --requirement requirements-dev.txt --strict
