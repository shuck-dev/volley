default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        entry: bash -c 'files=$(git diff --cached --name-only --diff-filter=d -- "*.gd" | grep -v "^addons/"); [ -z "$files" ] && exit 0; echo "$files" | xargs gdformat || exit 1; echo "$files" | xargs git add'
        language: system
        pass_filenames: false
        files: '\.gd$'
        exclude: '^addons/'
      - id: gdlint
        name: gdlint
        entry: gdlint
        language: system
        types: [file]
        files: '\.gd$'
        exclude: '^addons/'
      - id: gut-tests
        name: gut tests
        entry: godot --headless -s addons/gut/gut_cmdln.gd
        language: system
        pass_filenames: false
        files: '\.gd$'
        exclude: '^addons/'
