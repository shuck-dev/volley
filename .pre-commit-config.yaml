default_install_hook_types: [pre-commit, prepare-commit-msg]

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        entry: bash -c 'gdformat "$@" && git add "$@"' --
        language: system
        types: [file]
        files: '\.gd$'
        exclude: '^addons/'
      - id: gdlint
        name: gdlint
        entry: gdlint
        language: system
        types: [file]
        files: '\.gd$'
        exclude: '^addons/'
      - id: gut-tests
        name: gut tests
        entry: godot --headless -s addons/gut/gut_cmdln.gd
        language: system
        pass_filenames: false
        files: '\.gd$'
        exclude: '^addons/'
      - id: ticket-prefix
        name: Prepend Linear ticket number to commit message
        language: script
        entry: scripts/git/prepend_ticket_prefix.sh
        stages: [prepare-commit-msg]
        pass_filenames: false
        always_run: true
