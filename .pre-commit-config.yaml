repos:
  - repo: local
    hooks:
      - id: gdformat
        name: gdformat
        entry: bash -c 'gdformat "$@" && git add "$@"' --
        language: system
        types: [file]
        files: '\.gd$'
        exclude: '^addons/'
      - id: gdlint
        name: gdlint
        entry: gdlint
        language: system
        types: [file]
        files: '\.gd$'
        exclude: '^addons/'
