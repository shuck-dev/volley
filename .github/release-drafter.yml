name-template: "$NEXT_PATCH_VERSION"
tag-template: "$NEXT_PATCH_VERSION"

# Josh picks the real tag and title at publish time; these templates only
# exist because release-drafter requires them. The draft body is what matters.
version-resolver:
  default: patch

categories:
  - title: "Features"
    labels:
      - "feature"
  - title: "Fixes"
    labels:
      - "bug"
  - title: "Art"
    labels:
      - "asset"
      - "revision"
  - title: "Music"
    labels:
      - "cue"
      - "rework"
  - title: "Writing"
    labels:
      - "draft"
      - "rewrite"
  - title: "Audio"
    labels:
      - "sfx"
  - title: "Design"
    labels:
      - "tune"

# Map Conventional Commit `feat:` / `fix:` prefixes onto the intent labels so
# external contributors who write Conventional Commit titles still land in the
# right category.
autolabeler:
  - label: "feature"
    title:
      - "/^feat(\\(.+\\))?:/i"
      - "/^feat(\\(.+\\))?!:/i"
      - "/^SH-\\d+ feat(\\(.+\\))?:/i"
  - label: "bug"
    title:
      - "/^fix(\\(.+\\))?:/i"
      - "/^fix(\\(.+\\))?!:/i"
      - "/^SH-\\d+ fix(\\(.+\\))?:/i"

change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
change-title-escapes: '\<*_&'

exclude-labels:
  - "skip-changelog"

template: |
  One-line opener goes here; Josh rewrites this at publish time to capture what the release represents.

  ## What changed

  $CHANGES

  **Full changelog:** https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
