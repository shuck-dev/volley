name: Sync Design Docs to Notion

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**/*.md'
      - '.github/workflows/sync-docs.yml'
  workflow_dispatch:

jobs:
  sync:
    name: Sync to Notion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed design docs
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD -- 'designs/**/*.md' > changed_files.txt 2>/dev/null || find designs -name '*.md' > changed_files.txt
          cat changed_files.txt

      - name: Sync to Notion
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @notionhq/client@2.2.15 @tryfabric/martian

      - name: Push to Notion database
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const { Client } = require('@notionhq/client');
          const { markdownToBlocks } = require('@tryfabric/martian');

          const notion = new Client({ auth: process.env.NOTION_TOKEN });
          // Format database ID as UUID if needed
          const rawId = process.env.NOTION_DATABASE_ID.replace(/-/g, '');
          const databaseId = `${rawId.slice(0,8)}-${rawId.slice(8,12)}-${rawId.slice(12,16)}-${rawId.slice(16,20)}-${rawId.slice(20)}`;

          // Ensure the database has "File" and "Initiative" properties
          async function ensureFileProperty() {
            const db = await notion.databases.retrieve({ database_id: databaseId });
            const updates = {};
            if (!db.properties['File']) updates['File'] = { rich_text: {} };
            if (!db.properties['Initiative']) updates['Initiative'] = { select: {} };
            if (Object.keys(updates).length > 0) {
              await notion.databases.update({
                database_id: databaseId,
                properties: updates
              });
              console.log('Created missing properties on database');
            }
            // Find the title property name
            for (const [name, prop] of Object.entries(db.properties)) {
              if (prop.type === 'title') return name;
            }
            return 'Name';
          }

          let titleProp;

          function chunkArray(array, size) {
            const chunks = [];
            for (let i = 0; i < array.length; i += size) {
              chunks.push(array.slice(i, i + size));
            }
            return chunks;
          }

          async function appendBlocksInChunks(blockId, blocks) {
            for (const chunk of chunkArray(blocks, 100)) {
              await notion.blocks.children.append({ block_id: blockId, children: chunk });
            }
          }

          function getInitiative(filePath) {
            const parts = filePath.split('/');
            if (parts.length >= 3) {
              return parts[1];
            }
            return 'general';
          }

          async function syncFile(filePath) {
            const content = fs.readFileSync(filePath, 'utf-8');
            const title = content.match(/^#\s+(.+)/m)?.[1] || filePath;
            const blocks = markdownToBlocks(content);
            const initiative = getInitiative(filePath);

            // Check if page already exists
            const existing = await notion.databases.query({
              database_id: databaseId,
              filter: {
                property: 'File',
                rich_text: { equals: filePath }
              }
            });

            if (existing.results.length > 0) {
              const pageId = existing.results[0].id;
              // Delete existing blocks (paginated, Notion returns max 100 per list call)
              let hasMore = true;
              while (hasMore) {
                const children = await notion.blocks.children.list({ block_id: pageId });
                for (const block of children.results) {
                  await notion.blocks.delete({ block_id: block.id });
                }
                hasMore = children.has_more;
              }
              // Add updated blocks
              await appendBlocksInChunks(pageId, blocks);
              // Update title and initiative
              await notion.pages.update({
                page_id: pageId,
                properties: {
                  [titleProp]: { title: [{ text: { content: title } }] },
                  'Initiative': { select: { name: initiative } }
                }
              });
              console.log(`Updated: ${filePath}`);
            } else {
              // Create new page
              const firstChunk = blocks.slice(0, 100);
              const remaining = blocks.slice(100);
              const page = await notion.pages.create({
                parent: { database_id: databaseId },
                properties: {
                  [titleProp]: { title: [{ text: { content: title } }] },
                  'File': { rich_text: [{ text: { content: filePath } }] },
                  'Initiative': { select: { name: initiative } }
                },
                children: firstChunk
              });
              if (remaining.length > 0) {
                await appendBlocksInChunks(page.id, remaining);
              }
              console.log(`Created: ${filePath}`);
            }
          }

          async function main() {
            titleProp = await ensureFileProperty();
            const changedFiles = fs.readFileSync('changed_files.txt', 'utf-8')
              .split('\n')
              .filter(f => f.trim());

            for (const file of changedFiles) {
              await syncFile(file);
            }
          }

          main().catch(err => { console.error(err); process.exit(1); });
          SCRIPT
