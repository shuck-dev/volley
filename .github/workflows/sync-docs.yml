name: Sync Design Docs to Notion

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**/*.md'
      - '.github/workflows/sync-docs.yml'
  workflow_dispatch:

jobs:
  sync:
    name: Sync to Notion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed design docs
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD -- 'designs/**/*.md' > changed_files.txt 2>/dev/null || find designs -name '*.md' > changed_files.txt
          cat changed_files.txt

      - name: Sync to Notion
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @notionhq/client@2.2.15 @tryfabric/martian

      - name: Push to Notion database
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const { Client } = require('@notionhq/client');
          const { markdownToBlocks } = require('@tryfabric/martian');

          const notion = new Client({ auth: process.env.NOTION_TOKEN, notionVersion: '2022-06-28' });
          const databaseId = process.env.NOTION_DATABASE_ID;

          async function syncFile(filePath) {
            const content = fs.readFileSync(filePath, 'utf-8');
            const title = content.match(/^#\s+(.+)/m)?.[1] || filePath;
            const blocks = markdownToBlocks(content);

            // Check if page already exists
            const existing = await notion.databases.query({
              database_id: databaseId,
              filter: {
                property: 'File',
                rich_text: { equals: filePath }
              }
            });

            if (existing.results.length > 0) {
              const pageId = existing.results[0].id;
              // Delete existing blocks
              const children = await notion.blocks.children.list({ block_id: pageId });
              for (const block of children.results) {
                await notion.blocks.delete({ block_id: block.id });
              }
              // Add updated blocks
              await notion.blocks.children.append({ block_id: pageId, children: blocks });
              // Update title
              await notion.pages.update({
                page_id: pageId,
                properties: {
                  'Name': { title: [{ text: { content: title } }] }
                }
              });
              console.log(`Updated: ${filePath}`);
            } else {
              // Create new page
              await notion.pages.create({
                parent: { database_id: databaseId },
                properties: {
                  'Name': { title: [{ text: { content: title } }] },
                  'File': { rich_text: [{ text: { content: filePath } }] }
                },
                children: blocks
              });
              console.log(`Created: ${filePath}`);
            }
          }

          async function main() {
            const changedFiles = fs.readFileSync('changed_files.txt', 'utf-8')
              .split('\n')
              .filter(f => f.trim());

            for (const file of changedFiles) {
              await syncFile(file);
            }
          }

          main().catch(err => { console.error(err); process.exit(1); });
          SCRIPT
