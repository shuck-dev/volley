name: Approver Check

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read

jobs:
  verify-sender:
    name: Strip restricted label if applied by unauthorised actor
    if: >-
      github.event.label.name == 'approved-human' ||
      github.event.label.name == 'action-required-human' ||
      github.event.label.name == 'zaphod-blocked' ||
      github.event.label.name == 'zaphod-approved'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check sender and strip label if unauthorised
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MAINTAINER: J-Melon
        with:
          script: |
            // Each restricted label has its own allow-list.
            //   approved-human / action-required-human: Josh-only (both
            //     sides of the human verdict; SH-179).
            //   zaphod-approved / zaphod-blocked: Josh OR workflow runs
            //     (sender.login is 'github-actions[bot]' when a workflow
            //     applies them); bots post verdicts, Josh overrides.
            const labelName = context.payload.label.name;
            const maintainer = process.env.MAINTAINER;
            const policy = {
              'approved-human': new Set([maintainer]),
              'action-required-human': new Set([maintainer]),
              'zaphod-blocked': new Set([maintainer, 'github-actions[bot]']),
              'zaphod-approved': new Set([maintainer, 'github-actions[bot]']),
            };
            const allowed = policy[labelName];
            if (!allowed) {
              core.info(`No policy for ${labelName}; leaving it alone.`);
              return;
            }
            const actor = context.payload.sender && context.payload.sender.login;
            if (allowed.has(actor)) {
              core.info(`${labelName} applied by ${actor}; keeping.`);
              return;
            }
            core.warning(`${labelName} applied by ${actor}; removing.`);
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: labelName,
            });
            const allowedList = Array.from(allowed).map(u => `@${u}`).join(' or ');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `The \`${labelName}\` label is reserved for ${allowedList}. Removing the label applied by @${actor}.`,
            });
