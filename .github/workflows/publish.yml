name: Preview Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  ITCH_PROJECT: Speedyoshi/volley

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          sudo mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Import Project
        run: godot --headless --path . --import

      - name: Run Tests
        run: |
          mkdir -p logs
          godot --headless --path . -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json -gexit

  deploy-preview:
    name: Deploy to Preview
    needs: test
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v5

      - name: Write version
        run: git describe --always > version.txt

      - name: Strip dev addons
        run: |
          sed -i '/GodotIQRuntime=/d' project.godot
          sed -i 's|"res://addons/godotiq/plugin.cfg", ||g' project.godot
          sed -i 's|"res://addons/gut/plugin.cfg", ||g' project.godot
          sed -i 's|, "res://addons/gut/plugin.cfg"||g' project.godot
          rm -rf addons/coverage

      - name: Export Web
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          relative_project_path: ./
          cache: true
          export_debug: true

      - name: Download Butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Push to Itch.io Preview
        run: ./butler push "${{ steps.export.outputs.build_directory }}/Web" ${{ env.ITCH_PROJECT }}:html5-preview
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
