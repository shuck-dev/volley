name: Sync Design to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**/*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

concurrency:
  group: sync-wiki
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Mirror designs to wiki
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # contents: write is what lets the github-actions bot push to the
    # associated .wiki.git repo. Third-party GitHub Apps cannot request a
    # Wikis permission; only the first-party bot token can reach the wiki.
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Mirror designs/ into wiki/
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          mkdir -p wiki

          copy_with_rewrite() {
            local src="$1" dest="$2" dir="$3"
            # Rewrite markdown link targets so they resolve in the flattened wiki:
            #   - strip .md extension
            #   - flatten internal slashes to dashes
            #   - prefix bare relative links with the source file's folder
            #   - apply Title Case (with small-word filter) to match flat filenames
            # [^):] in the character class excludes "://" so http URLs are untouched.
            # Slurp mode (-0777) lets us also strip the file's leading H1 in one pass:
            # the wiki publisher injects the page title from the filename, so leaving
            # the source's first `# Heading` produces a duplicate title row.
            DIR="$dir" perl -0777 -pe '
              BEGIN {
                our %SMALL = map { $_ => 1 } qw(a an the and or but of in on to by at for with is as if vs from into);
                sub title_case {
                  my @segs = split /-/, $_[0];
                  for my $i (0..$#segs) {
                    my $w = $segs[$i];
                    next unless length $w;
                    if ($i == 0 || $i == $#segs || !exists $SMALL{lc $w}) {
                      $segs[$i] = uc(substr($w,0,1)) . substr($w,1) if substr($w,0,1) =~ /[a-z]/;
                    } else {
                      $segs[$i] = lc $w;
                    }
                  }
                  join("-", @segs);
                }
              }
              s{\]\(([^):\s]+)\.md(\#[^)]*)?\)}{
                my ($p, $a) = ($1, $2 // "");
                my @dir = split m{/}, ($ENV{DIR} // "");
                my @parts = split m{/}, $p;
                while (@parts && $parts[0] eq "..") { shift @parts; pop @dir; }
                my @combined = (@dir, @parts);
                my $target;
                if (@combined > 1 && $combined[-1] eq "INDEX") {
                  # designs/<sub>/INDEX.md publishes as <Sub>.md.
                  pop @combined;
                  $target = title_case(join("-", @combined));
                } elsif (@combined == 1 && $combined[0] eq "INDEX") {
                  # designs/INDEX.md publishes as Home.
                  $target = "Home";
                } else {
                  $target = title_case(join("-", @combined));
                }
                "]($target$a)"
              }ge;
              # Strip the very first leading H1 (and the blank line after it, if any).
              # Anchored at start-of-file so navigation files like _Sidebar.md, whose
              # first line is bold-link text rather than `# `, are untouched, and so
              # subsequent `# Headings` deeper in the document survive.
              s{\A\# [^\n]*\n\n?}{};
            ' "$src" > "$dest"
          }

          # Title Case a hyphen-separated name with a small-word filter.
          # "title-is-this" -> "Title-is-This"; "01-prototype" -> "01-Prototype";
          # "narrative-discipline" -> "Narrative-Discipline".
          # First and last words always capped (when the leading char is a lowercase
          # letter); middle small words ("a", "an", "the", "and", "or", "but", "of",
          # "in", "on", "to", "by", "at", "for", "with", "is", "as", "if", "vs",
          # "from", "into") stay lowercase.
          title_case() {
            python3 -c '
import sys
small = {"a","an","the","and","or","but","of","in","on","to","by","at","for","with","is","as","if","vs","from","into"}
parts = sys.argv[1].split("-")
out = []
for i, p in enumerate(parts):
    if not p:
        out.append(p)
        continue
    if i in (0, len(parts)-1) or p.lower() not in small:
        out.append(p[0].upper() + p[1:] if p[0].isalpha() and p[0].islower() else p)
    else:
        out.append(p.lower())
print("-".join(out))
' "$1"
          }

          for src in designs/**/*.md; do
            rel="${src#designs/}"
            [ "$rel" = "INDEX.md" ] && continue
            dir="$(dirname "$rel")"
            base="$(basename "$rel")"
            if [ "$base" = "INDEX.md" ] && [ "$dir" != "." ]; then
              # designs/<sub>/INDEX.md becomes wiki/<Sub>.md so the wiki page
              # title is "Sub" instead of "sub-INDEX".
              flat="$(title_case "${dir//\//-}").md"
            else
              flat_stem="$(title_case "${rel//\//-}")"
              flat="${flat_stem%.Md}.md"
            fi
            [ "$dir" = "." ] && dir=""
            copy_with_rewrite "$src" "wiki/$flat" "$dir"
          done

          if [ -f designs/INDEX.md ]; then
            copy_with_rewrite designs/INDEX.md wiki/Home.md ""
          fi

      - name: Publish wiki
        uses: Andrew-Chen-Wang/github-wiki-action@64efa0a9436db17670a2259e0ac249d6f08bb352 # v5.0.4
        with:
          path: wiki
          # Our bash already handled link rewriting and the INDEX.md rename,
          # so we skip the action's built-in preprocess pass to avoid
          # double-mangling the links we just produced.
          preprocess: false
          disable-empty-commits: true
