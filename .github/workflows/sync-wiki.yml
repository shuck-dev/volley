name: Sync Design to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**/*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

concurrency:
  group: sync-wiki
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Mirror designs to wiki
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout wiki
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.WIKI_TOKEN }}

      - name: Mirror designs/ into wiki
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          find wiki -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          copy_with_rewrite() {
            local src="$1" dest="$2" dir="$3"
            # Rewrite markdown link targets so they resolve in the flattened wiki:
            #   - strip .md extension
            #   - flatten internal slashes to dashes
            #   - prefix bare relative links with the source file's folder
            # [^):] in the character class excludes "://" so http URLs are untouched.
            DIR="$dir" perl -pe '
              s{\]\(([^):\s]+)\.md(\#[^)]*)?\)}{
                my ($p, $a) = ($1, $2 // "");
                my @dir = split m{/}, ($ENV{DIR} // "");
                my @parts = split m{/}, $p;
                while (@parts && $parts[0] eq "..") { shift @parts; pop @dir; }
                my $joined = join("-", @dir, @parts);
                "]($joined$a)"
              }ge' "$src" > "$dest"
          }

          for src in designs/**/*.md; do
            rel="${src#designs/}"
            [ "$rel" = "INDEX.md" ] && continue
            flat="${rel//\//-}"
            dir="$(dirname "$rel")"
            [ "$dir" = "." ] && dir=""
            copy_with_rewrite "$src" "wiki/$flat" "$dir"
          done

          if [ -f designs/INDEX.md ]; then
            copy_with_rewrite designs/INDEX.md wiki/Home.md ""
          fi

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync designs/ from ${{ github.sha }}"
            git push
          else
            echo "No changes to sync."
          fi
