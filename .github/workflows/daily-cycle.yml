name: AI Daily Cycle

# ---------------------------------------------------------------------------
# SH-134: autonomous daily nibble at the active Linear cycle.
#
# Fires weekdays at 05:17 UTC (off-peak for this team) and on manual dispatch.
# Picks one eligible ticket from the currently active Linear cycle, then hands
# it to a headless Claude Code session whose brief is: "work SH-N per
# ai/PARALLEL.md, stop at PR handoff".
#
# Eligibility (all must hold):
#   - Ticket is in the active cycle.
#   - State is Backlog or Ready.
#   - Carries the `feature` or `bug` label.
#   - No existing `sh-N-*` branch on GitHub (avoids trampling in-flight work).
#   - Non-empty acceptance criteria in the description.
#   - No unresolved blockers (`blockedByIssues` all completed/cancelled).
#
# Tie-break: highest priority first (Linear encodes priority as a number where
# 1 = urgent, 4 = low; 0 means no-priority, treated as last), then oldest
# updatedAt, then lowest SH-N.
#
# Safety rails (fail closed):
#   - No write permissions beyond `contents: write` + `pull-requests: write`
#     (same as a human contributor opening a PR). Cannot force-push to main.
#   - Claude harness receives no merge tooling; the brief forbids merging.
#   - Godot is never installed on this runner, so Tier 2 runtime is physically
#     impossible — no `run(play)`, no screenshots that hit the editor.
#   - If `CLAUDE_CODE_OAUTH_TOKEN` is missing, the workflow logs a clear notice
#     and exits 0 (graceful skip, no false-failure noise in the Actions tab).
#   - If `LINEAR_API_KEY` is missing, same deal.
#   - `concurrency` group ensures only one daily-cycle run ever executes at a
#     time; a second dispatch during an active run is cancelled.
#
# Cost ceiling:
#   - `timeout-minutes: 60` on the job caps the Claude session at one hour of
#     wall-clock. Anthropic bills per-token on the OAuth tier, but this keeps
#     a runaway loop from burning an entire day of credits.
#   - `max_turns: 40` on the Claude action provides a hard ceiling on tool
#     calls per session (≈ $5–$15 at Opus pricing for a typical ticket).
#
# Kill-switch:
#   - Disable the workflow in the Actions tab: "Daily cycle — headless Claude
#     on one ticket" → "⋯" → "Disable workflow". Cron stops immediately.
#   - Or delete / rotate the `CLAUDE_CODE_OAUTH_TOKEN` secret — the workflow
#     will log-and-skip on the next run instead of hanging.
#   - Or push an empty `.github/daily-cycle.halt` file to main: the preflight
#     job short-circuits if that path exists.
#
# Required secrets (Josh to create):
#   - `CLAUDE_CODE_OAUTH_TOKEN`: OAuth token for the headless Claude Code
#     action. Generate with `claude setup-token` locally, then paste into
#     repo Settings → Secrets → Actions.
#   - `LINEAR_API_KEY`: personal API key from Linear → Settings → API.
#   - `NTFY_TOPIC` (optional): push-notification topic. If unset, the pick /
#     skip line is logged to the job summary only.
# ---------------------------------------------------------------------------

on:
  schedule:
    # 05:17 UTC Mon–Fri. Odd minute to dodge the cron stampede at :00 / :15.
    - cron: "17 5 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pick a ticket and log, but do not dispatch Claude"
        type: boolean
        default: false

concurrency:
  group: daily-cycle
  cancel-in-progress: false

# Workflow-level default is least-privilege. The `dispatch-claude` job
# overrides with the write scopes it needs to branch / push / open PRs.
permissions:
  contents: read

jobs:
  pick-ticket:
    name: Pick eligible ticket from active cycle
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ticket_id: ${{ steps.pick.outputs.ticket_id }}
      ticket_number: ${{ steps.pick.outputs.ticket_number }}
      ticket_title: ${{ steps.pick.outputs.ticket_title }}
      ticket_url: ${{ steps.pick.outputs.ticket_url }}
      skipped: ${{ steps.pick.outputs.skipped || steps.earlyskip.outputs.skipped || 'true' }}
      skip_reason: ${{ steps.pick.outputs.skip_reason || steps.earlyskip.outputs.skip_reason }}
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Kill-switch check
        id: killswitch
        run: |
          if [ -f .github/daily-cycle.halt ]; then
            echo "Halt file present; exiting cleanly."
            echo "halted=true" >> "$GITHUB_OUTPUT"
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight — required secrets present?
        id: preflight
        if: steps.killswitch.outputs.halted != 'true'
        env:
          HAS_CLAUDE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_LINEAR: ${{ secrets.LINEAR_API_KEY != '' }}
        run: |
          set -e
          if [ "$HAS_LINEAR" != "true" ]; then
            echo "::notice::LINEAR_API_KEY secret is not configured; skipping run."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing-linear-key" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$HAS_CLAUDE" != "true" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN secret is not configured; skipping run."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing-claude-token" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Pick a ticket
        id: pick
        if: steps.killswitch.outputs.halted != 'true' && steps.preflight.outputs.ready == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Linear stores the Volley team under the SH key. We ask the API for
          # the team, then its active cycle, then eligible issues within that
          # cycle. One round-trip per step keeps the query readable; caching
          # the team id would shave ~200ms but add complexity for no gain.

          graphql() {
            local query="$1"
            curl --silent --show-error --fail \
              -X POST \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg q "$query" '{query: $q}')" \
              https://api.linear.app/graphql
          }

          TEAM_KEY="SH"

          TEAM_RESP=$(graphql "query { teams(filter: { key: { eq: \"$TEAM_KEY\" } }) { nodes { id name activeCycle { id number } } } }")
          TEAM_ID=$(echo "$TEAM_RESP" | jq -r '.data.teams.nodes[0].id // empty')
          CYCLE_ID=$(echo "$TEAM_RESP" | jq -r '.data.teams.nodes[0].activeCycle.id // empty')

          if [ -z "$TEAM_ID" ]; then
            echo "::warning::Could not resolve team $TEAM_KEY from Linear; skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=team-not-found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$CYCLE_ID" ]; then
            echo "No active cycle on team $TEAM_KEY; skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no-active-cycle" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull all issues in the cycle that are Backlog or Ready and carry a
          # feature / bug label. Linear's `filter` supports state type + label
          # name match; we sort server-side by priority asc then updatedAt asc
          # so the first eligible one after client-side filtering is the pick.
          ISSUES_QUERY='query { issues(
            first: 50,
            filter: {
              cycle: { id: { eq: "'$CYCLE_ID'" } },
              state: { type: { in: ["backlog", "unstarted"] } },
              labels: { name: { in: ["feature", "bug"] } }
            },
            orderBy: updatedAt
          ) { nodes {
            id identifier title url priority updatedAt description
            state { name type }
            labels { nodes { name } }
            branchName
            inverseRelations { nodes { type issue { state { type } } } }
          } } }'

          ISSUES_RESP=$(graphql "$ISSUES_QUERY")
          TOTAL=$(echo "$ISSUES_RESP" | jq '.data.issues.nodes | length')
          echo "Linear returned $TOTAL candidate issue(s) before local filtering."

          # List branches on GitHub once; every SH-N eligibility check reuses.
          mapfile -t EXISTING_BRANCHES < <(
            gh api "repos/${GH_REPO}/branches?per_page=100" --paginate --jq '.[].name' \
              | tr '[:upper:]' '[:lower:]'
          )

          branch_exists_for() {
            local num="$1"
            local prefix="sh-${num}-"
            for branch in "${EXISTING_BRANCHES[@]}"; do
              case "$branch" in
                "$prefix"*) return 0 ;;
              esac
            done
            return 1
          }

          # Build a JSON array of eligible tickets with a compound sort key.
          ELIGIBLE=$(echo "$ISSUES_RESP" | jq -c '[.data.issues.nodes[]]')

          PICK=""
          BEST_PRIORITY=99
          BEST_UPDATED=""
          BEST_NUM=999999

          COUNT=$(echo "$ELIGIBLE" | jq 'length')
          for i in $(seq 0 $((COUNT - 1))); do
            ROW=$(echo "$ELIGIBLE" | jq -c ".[$i]")
            IDENT=$(echo "$ROW" | jq -r '.identifier')
            NUM=${IDENT#SH-}
            TITLE=$(echo "$ROW" | jq -r '.title')
            PRIO=$(echo "$ROW" | jq -r '.priority')
            UPDATED=$(echo "$ROW" | jq -r '.updatedAt')
            DESC=$(echo "$ROW" | jq -r '.description // ""')

            # Priority 0 (no-priority) sorts last; remap to 5.
            if [ "$PRIO" = "0" ]; then PRIO=5; fi

            # Non-empty AC: the ticket-writing guide lands an "Acceptance
            # Criteria" block with checkbox items. A raw `- [ ]` is the
            # cheapest marker that one exists.
            if ! echo "$DESC" | grep -q '\- \[ \]'; then
              echo "skip $IDENT: no acceptance criteria checkboxes"
              continue
            fi

            # Blocker check: any `blocks` relation whose source issue is still
            # open (state type not in completed/cancelled).
            OPEN_BLOCKERS=$(echo "$ROW" | jq '[.inverseRelations.nodes[]? | select(.type == "blocks" and .issue.state.type != "completed" and .issue.state.type != "canceled")] | length')
            if [ "$OPEN_BLOCKERS" != "0" ]; then
              echo "skip $IDENT: $OPEN_BLOCKERS open blocker(s)"
              continue
            fi

            if branch_exists_for "$NUM"; then
              echo "skip $IDENT: sh-${NUM}-* branch already exists on GitHub"
              continue
            fi

            # Compound sort: priority asc, updatedAt asc, number asc.
            if [ "$PRIO" -lt "$BEST_PRIORITY" ] \
               || { [ "$PRIO" = "$BEST_PRIORITY" ] && [[ "$UPDATED" < "$BEST_UPDATED" || -z "$BEST_UPDATED" ]]; } \
               || { [ "$PRIO" = "$BEST_PRIORITY" ] && [ "$UPDATED" = "$BEST_UPDATED" ] && [ "$NUM" -lt "$BEST_NUM" ]; }; then
              BEST_PRIORITY=$PRIO
              BEST_UPDATED=$UPDATED
              BEST_NUM=$NUM
              PICK=$ROW
            fi
          done

          if [ -z "$PICK" ]; then
            echo "No eligible tickets today."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no-eligible-tickets" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PICK_ID=$(echo "$PICK" | jq -r '.id')
          PICK_IDENT=$(echo "$PICK" | jq -r '.identifier')
          PICK_TITLE=$(echo "$PICK" | jq -r '.title')
          PICK_URL=$(echo "$PICK" | jq -r '.url')
          PICK_NUM=${PICK_IDENT#SH-}

          echo "Picked $PICK_IDENT: $PICK_TITLE"
          echo "ticket_id=$PICK_ID" >> "$GITHUB_OUTPUT"
          echo "ticket_number=$PICK_NUM" >> "$GITHUB_OUTPUT"
          echo "ticket_title=$PICK_TITLE" >> "$GITHUB_OUTPUT"
          echo "ticket_url=$PICK_URL" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          {
            echo "## Daily cycle pick"
            echo ""
            echo "- Ticket: **[$PICK_IDENT]($PICK_URL)** — $PICK_TITLE"
            echo "- Priority: $BEST_PRIORITY"
            echo "- Updated: $BEST_UPDATED"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark halt or missing-secrets skip
        id: earlyskip
        if: steps.killswitch.outputs.halted == 'true' || steps.preflight.outputs.ready != 'true'
        env:
          HALTED: ${{ steps.killswitch.outputs.halted }}
          PREFLIGHT_REASON: ${{ steps.preflight.outputs.reason }}
        run: |
          set -e
          if [ "$HALTED" = "true" ]; then
            REASON="halted"
          else
            REASON="${PREFLIGHT_REASON:-unknown}"
          fi
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$REASON" >> "$GITHUB_OUTPUT"
          {
            echo "## Daily cycle skipped"
            echo ""
            echo "Reason: \`$REASON\`"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-pick:
    name: Notify pick / skip
    needs: pick-ticket
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post to ntfy (if configured)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TICKET_ID: ${{ needs.pick-ticket.outputs.ticket_number }}
          TICKET_TITLE: ${{ needs.pick-ticket.outputs.ticket_title }}
          TICKET_URL: ${{ needs.pick-ticket.outputs.ticket_url }}
          SKIPPED: ${{ needs.pick-ticket.outputs.skipped }}
          SKIP_REASON: ${{ needs.pick-ticket.outputs.skip_reason }}
        run: |
          set -euo pipefail
          if [ -z "${NTFY_TOPIC:-}" ]; then
            echo "NTFY_TOPIC not set; logging locally only."
            if [ "$SKIPPED" = "true" ]; then
              echo "Daily cycle skipped: $SKIP_REASON"
            else
              echo "Daily cycle picked SH-$TICKET_ID: $TICKET_TITLE"
            fi
            exit 0
          fi

          if [ "$SKIPPED" = "true" ]; then
            TITLE="Daily cycle skipped"
            BODY="Reason: ${SKIP_REASON:-unknown}"
          else
            TITLE="Daily cycle picked SH-$TICKET_ID"
            BODY="$(printf '%s\n%s' "$TICKET_TITLE" "$TICKET_URL")"
          fi

          curl --silent --show-error --fail \
            -H "Title: $TITLE" \
            -H "Priority: default" \
            -H "Tags: robot" \
            -d "$BODY" \
            "https://ntfy.sh/$NTFY_TOPIC"

  dispatch-claude:
    name: Headless Claude works the ticket
    needs: pick-ticket
    if: needs.pick-ticket.outputs.skipped == 'false' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "daily-cycle-bot"
          git config user.email "daily-cycle-bot@users.noreply.github.com"

      - name: Run Claude Code headless
        uses: anthropics/claude-code-action@5d5c10a4f389689f992ea10bb14dcb6fcc83146d # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Work SH-${{ needs.pick-ticket.outputs.ticket_number }} per ai/PARALLEL.md.

            Ticket: ${{ needs.pick-ticket.outputs.ticket_title }}
            Link: ${{ needs.pick-ticket.outputs.ticket_url }}

            Rules:
            - Stop at PR handoff. Do NOT merge the PR yourself; Josh merges.
            - Do NOT run the game (no `run(play)`, no Tier 2 runtime). Static checks only.
            - Follow every rule in CLAUDE.md and ai/PARALLEL.md: branch naming
              (`sh-${{ needs.pick-ticket.outputs.ticket_number }}-<slug>`),
              commit sign-off, Conventional Commits, lefthook green, ggut green.
            - After opening the PR, dispatch the specialist reviewers that
              match the changed paths per ai/PARALLEL.md.
            - If you hit a loop or design ambiguity, escalate in the Activity
              Log of ai/PARALLEL.md with the `ESCALATE:` prefix and stop.
          claude_args: |
            --max-turns 40
            --allowedTools "Bash,Read,Write,Edit,Grep,Glob"
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Session summary
        if: always()
        run: |
          {
            echo "## Claude session complete"
            echo ""
            echo "Ticket: SH-${{ needs.pick-ticket.outputs.ticket_number }}"
            echo "Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
