name: Live Release

on:
  release:
    types: [published]

# Releases are idempotent by tag; queue same-tag runs rather than cancelling a
# build mid-flight.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"
  GODOT_LINUX_SHA256: "30e6b6d141f0cd5bebd629ad1d0ef1324e60091bb20662d026b402ba58c59937"
  GODOT_TEMPLATES_SHA256: "942366dc4e27e7686a99da4d3cfb1b8ae8d3eb9444f6d8217eef16245b599ef2"
  BUTLER_VERSION: "15.26.1"
  BUTLER_SHA256: "b724504bccf259eb01668e1d20b97f6e376d965761e306a75530e19225c510e3"
  ITCH_PROJECT: Speedyoshi/volley

jobs:
  test:
    uses: ./.github/workflows/test.yml

  promote-lfs:
    name: Promote LFS objects to release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: false

      - name: Collect released LFS oids
        id: oids
        run: |
          git lfs ls-files --long | awk '{print $1}' | jq -Rsc 'split("\n") | map(select(. != ""))' > oids.json

      - name: Promote preview objects to release
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Basic $(printf 'volley:%s' "${{ secrets.LFS_PROMOTE_KEY }}" | base64 -w0)" \
            -H "Content-Type: application/json" \
            -d "{\"oids\": $(cat oids.json)}" \
            https://volley-lfs-proxy.volcanoem.workers.dev/promote

  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch LFS assets
        run: |
          git config lfs.url "https://volley:${{ secrets.LFS_DOWNLOAD_KEY }}@volley-lfs-proxy.volcanoem.workers.dev"
          git lfs pull --include="assets/**"

      - name: Strip dev addons
        run: |
          sed -i '/GodotIQRuntime=/d' project.godot
          sed -i 's|"res://addons/godotiq/plugin.cfg", ||g' project.godot
          sed -i 's|"res://addons/gut/plugin.cfg", ||g' project.godot
          sed -i 's|, "res://addons/gut/plugin.cfg"||g' project.godot
          rm -rf addons/coverage

      - name: Verify pinned Godot artifacts
        run: |
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          echo "${GODOT_LINUX_SHA256}  /tmp/godot.zip" | sha256sum -c -
          curl -L -o /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          echo "${GODOT_TEMPLATES_SHA256}  /tmp/templates.tpz" | sha256sum -c -

      - name: Cache Godot import artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .godot
          key: godot-import-${{ env.GODOT_VERSION }}-${{ hashFiles('project.godot', '**/*.tscn', '**/*.tres', '**/*.gd', 'assets/**', 'art/**', 'resources/**') }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-

      - name: Export all platforms
        id: export
        uses: firebelley/godot-export@615a6f7afc22d6266bf55c17748fb07447e8bdab # v8.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          relative_project_path: ./
          cache: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.export.outputs.build_directory }}/Linux/volley.x86_64
            ${{ steps.export.outputs.build_directory }}/Windows/volley.exe
            ${{ steps.export.outputs.build_directory }}/macOS/volley.zip

      - name: Download Butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/${{ env.BUTLER_VERSION }}/archive/default
          echo "${BUTLER_SHA256}  butler.zip" | sha256sum -c -
          unzip butler.zip
          chmod +x butler

      - name: Push Linux to Itch.io
        run: ./butler push "${{ steps.export.outputs.build_directory }}/Linux" ${{ env.ITCH_PROJECT }}:linux --userversion ${{ github.event.release.tag_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push Windows to Itch.io
        run: ./butler push "${{ steps.export.outputs.build_directory }}/Windows" ${{ env.ITCH_PROJECT }}:windows --userversion ${{ github.event.release.tag_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

      - name: Push macOS to Itch.io
        run: ./butler push "${{ steps.export.outputs.build_directory }}/macOS/volley.zip" ${{ env.ITCH_PROJECT }}:osx --userversion ${{ github.event.release.tag_name }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
