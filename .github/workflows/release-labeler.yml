name: Release Labeler

on:
  pull_request:
    # synchronize omitted: PR titles do not change between pushes, and
    # edited already covers title edits. Dropping synchronize saves a
    # billed minute per extra commit on a PR.
    types: [opened, edited]

concurrency:
  group: release-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Maps Conventional Commit prefixes in the PR title onto category labels
  # so the release-drafter workflow on main groups merges correctly.
  # Split out of the drafter workflow so skipped-on-PR / skipped-on-push
  # check noise is gone.
  autolabel:
    name: Apply release category labels from PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Autolabel
        uses: release-drafter/release-drafter/autolabeler@5de93583980a40bd78603b6dfdcda5b4df377b32 # v7.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
