name: Fork Review Gate

# SH-178 gates automated reviewer dispatch on fork PRs behind the
# `zaphod-requested` label. Internal (same-repo) PRs keep their auto
# fan-out; fork PRs only fire specialist reviewers when a maintainer
# opts in by applying the label. This stops external contributors from
# burning review cycles by opening noisy or bot-authored PRs.
#
# The label is deliberately transient: every new commit strips it, so
# each re-request is a fresh maintainer action. Matches the discipline
# the zaphod verdict labels use in reviewer-re-run.yml.
#
# `reviewer-re-run.yml` is owned by Bundle D this swarm and cannot be
# extended here, so the strip lives in its own workflow. Using
# pull_request (not pull_request_target) is safe because we only mutate
# labels via the GITHUB_TOKEN scoped to this workflow; no fork code is
# checked out or executed.

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: fork-review-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  strip-zaphod-requested:
    name: Strip zaphod-requested on new commits
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Remove zaphod-requested
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'zaphod-requested',
              });
              core.info('Removed zaphod-requested on synchronize.');
            } catch (error) {
              if (error.status === 404) {
                core.info('zaphod-requested not present; skipping.');
              } else {
                throw error;
              }
            }
