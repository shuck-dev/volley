name: Reviewer Re-run

# When the bot synthesis review lands, the standing zaphod-requested "please
# review" signal has been answered, so strip it. The agent reviewer verdict now
# rides the bot review (APPROVE / REQUEST_CHANGES under shuck-volley-bot[bot]),
# not the retired zaphod-approved / zaphod-blocked labels. A stale bot approval
# is dismissed on a new push by the ruleset's dismiss-stale-reviews-on-push (a
# request-changes persists until re-review), so no strip-on-push reconciler is
# needed, and with a single bot verdict there is no approver/blocker race.

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

concurrency:
  group: reviewer-re-run-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verdict-strips-request:
    name: Bot review strips request label
    # Only the bot's synthesis review answers the zaphod-requested signal; a
    # human or other review does not.
    if: github.event.review.user.login == 'shuck-volley-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Remove zaphod-requested if present
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'zaphod-requested',
              });
              core.info('Removed zaphod-requested; the bot synthesis review answers the request.');
            } catch (error) {
              if (error.status === 404) {
                core.info('zaphod-requested not present; nothing to strip.');
              } else {
                // Housekeeping only (e.g. read-only token on a fork review);
                // do not fail the run.
                core.warning(`Could not strip zaphod-requested: ${error.message}`);
              }
            }
