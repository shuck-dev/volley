name: Lint

on:
  pull_request:
    branches:
      - main

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.28.0"

jobs:
  lint:
    name: Run Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python tools
        run: |
          pip install --user -r requirements-dev.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}

      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz \
            | tar -xz -C ~/.local/bin gitleaks

      - name: gdformat
        run: find scripts tests -name '*.gd' | xargs gdformat --check

      - name: gdlint
        run: find scripts tests -name '*.gd' | xargs gdlint

      - name: codespell
        run: codespell

      - name: gitleaks
        run: gitleaks detect --redact --verbose --no-banner
