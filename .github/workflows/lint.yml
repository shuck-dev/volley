name: Lint

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.28.0"
  ACTIONLINT_VERSION: "1.7.12"

jobs:
  gdformat:
    name: gdformat
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lint.txt

      - name: Install Python tools
        run: |
          pip install --user -r requirements-lint.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: gdformat
        run: find scripts tests -name '*.gd' -print0 | xargs -0 gdformat --check

  gdlint:
    name: gdlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lint.txt

      - name: Install Python tools
        run: |
          pip install --user -r requirements-lint.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: gdlint
        run: find scripts tests -name '*.gd' -print0 | xargs -0 gdlint

  text-checks:
    name: text-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lint.txt

      - name: Install Python tools
        run: |
          pip install --user -r requirements-lint.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}

      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz \
            | tar -xz -C ~/.local/bin gitleaks

      - name: codespell
        run: codespell

      - name: gitleaks
        run: gitleaks detect --redact --verbose --no-banner

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache actionlint
        id: cache-actionlint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/actionlint
          key: actionlint-${{ env.ACTIONLINT_VERSION }}

      - name: Install actionlint
        if: steps.cache-actionlint.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          url="https://github.com/rhysd/actionlint/releases/download/v${{ env.ACTIONLINT_VERSION }}/actionlint_${{ env.ACTIONLINT_VERSION }}_linux_amd64.tar.gz"
          for attempt in 1 2 3; do
            if curl -sSfL "$url" | tar -xz -C ~/.local/bin actionlint; then
              exit 0
            fi
            echo "actionlint download attempt $attempt failed; retrying" >&2
            sleep "$((attempt * 3))"
          done
          echo "::warning::actionlint download failed after 3 attempts; skipping actionlint this run"

      - name: actionlint
        run: |
          if [ -x ~/.local/bin/actionlint ]; then
            ~/.local/bin/actionlint -color
          else
            echo "::warning::actionlint binary unavailable (download flake); skipping"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [gdformat, gdlint, text-checks, actionlint]
    if: always()
    steps:
      - name: Umbrella gate
        run: |
          if [ "${{ needs.gdformat.result }}" != "success" ] \
            || [ "${{ needs.gdlint.result }}" != "success" ] \
            || [ "${{ needs.text-checks.result }}" != "success" ] \
            || [ "${{ needs.actionlint.result }}" != "success" ]; then
            echo "::error::One or more lint jobs failed"
            exit 1
          fi
