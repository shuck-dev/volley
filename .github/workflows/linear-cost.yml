name: Linear Cost Tracker

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Linear issue ID (e.g. SH-123)"
        required: true

env:
  HOURLY_COST: "21.35"
  CURRENCY: "£"

jobs:
  update-cost:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Extract Linear issue ID
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_ID="${{ github.event.inputs.issue_id }}"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            ISSUE_ID=$(echo "$BRANCH" | grep -oE 'SH-[0-9]+' | head -1)
          fi

          if [ -z "$ISSUE_ID" ]; then
            echo "No Linear issue ID found"
            exit 0
          fi

          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "Found Linear issue: $ISSUE_ID"

      - name: Fetch time from TrackingTime
        if: steps.extract.outputs.issue_id
        id: time
        env:
          TT_AUTH: ${{ secrets.TRACKINGTIME_AUTH }}
          TT_ACCOUNT_ID: ${{ vars.TRACKINGTIME_ACCOUNT_ID }}
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"

          # Get all tasks and filter by Linear issue ID
          TASKS=$(curl -s \
            "https://app.trackingtime.co/api/v4/$TT_ACCOUNT_ID/tasks" \
            -H "Authorization: Basic $TT_AUTH" \
            -H "User-Agent: LinearCostTracker/1.0")

          # Extract task IDs where name contains the Linear issue ID
          TASK_IDS=$(echo "$TASKS" | jq -r --arg id "$ISSUE_ID" '.data[]? | select(.name | contains($id)) | .id')

          if [ -z "$TASK_IDS" ]; then
            echo "No TrackingTime tasks found for $ISSUE_ID"
            echo "total_seconds=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch time entries for each task and sum durations
          TOTAL_SECONDS=0
          FROM="2020-01-01"
          TO=$(date +%Y-%m-%d)

          for TASK_ID in $TASK_IDS; do
            ENTRIES=$(curl -s \
              "https://app.trackingtime.co/api/v4/$TT_ACCOUNT_ID/events?filter=TASK&id=$TASK_ID&from=$FROM&to=$TO" \
              -H "Authorization: Basic $TT_AUTH" \
              -H "User-Agent: LinearCostTracker/1.0")

            SECONDS=$(echo "$ENTRIES" | jq '[.data[]?.duration // 0] | add // 0')
            TOTAL_SECONDS=$((TOTAL_SECONDS + SECONDS))
          done

          echo "total_seconds=$TOTAL_SECONDS" >> "$GITHUB_OUTPUT"
          echo "Total tracked: ${TOTAL_SECONDS}s"

      - name: Calculate cost and post to Linear
        if: steps.extract.outputs.issue_id
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          TOTAL_SECONDS="${{ steps.time.outputs.total_seconds }}"

          # Calculate hours and cost
          HOURS=$(echo "scale=2; $TOTAL_SECONDS / 3600" | bc)
          COST=$(echo "scale=2; $HOURS * $HOURLY_COST" | bc)

          # Format for display
          if [ "$TOTAL_SECONDS" -eq 0 ]; then
            BODY="**Cost Report** — No time tracked in TrackingTime for this issue."
          else
            BODY="**Cost Report**\n- Time tracked: **${HOURS}h**\n- Hourly cost: **${CURRENCY}${HOURLY_COST}**\n- Total cost: **${CURRENCY}${COST}**"
          fi

          echo "Posting to $ISSUE_ID: $BODY"

          # Find the Linear issue by identifier
          ISSUE_DATA=$(curl -s -X POST \
            "https://api.linear.app/graphql" \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ issues(filter: { number: { eq: ${ISSUE_ID##*-} }, team: { key: { eq: \\\"${ISSUE_ID%%-*}\\\" } } }) { nodes { id } } }\"}")

          echo "Linear response: $ISSUE_DATA"
          LINEAR_ISSUE_UUID=$(echo "$ISSUE_DATA" | jq -r '.data.issues.nodes[0].id // empty')

          if [ -z "$LINEAR_ISSUE_UUID" ]; then
            echo "Could not find Linear issue $ISSUE_ID"
            exit 1
          fi

          # Check for existing cost comment to update
          COMMENTS=$(curl -s -X POST \
            "https://api.linear.app/graphql" \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ issue(id: \\\"$LINEAR_ISSUE_UUID\\\") { comments { nodes { id body } } } }\"}")

          EXISTING_COMMENT_ID=$(echo "$COMMENTS" | jq -r '.data.issue.comments.nodes[] | select(.body | startswith("**Cost Report**")) | .id' | head -1)

          FORMATTED_BODY=$(printf "$BODY")

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            # Update existing comment
            curl -s -X POST \
              "https://api.linear.app/graphql" \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { commentUpdate(id: \\\"$EXISTING_COMMENT_ID\\\", input: { body: \\\"$FORMATTED_BODY\\\" }) { success } }\"}"
            echo "Updated existing cost comment"
          else
            # Create new comment
            curl -s -X POST \
              "https://api.linear.app/graphql" \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { commentCreate(input: { issueId: \\\"$LINEAR_ISSUE_UUID\\\", body: \\\"$FORMATTED_BODY\\\" }) { success } }\"}"
            echo "Created new cost comment"
          fi
