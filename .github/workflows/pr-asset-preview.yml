name: PR asset preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "assets/**"

concurrency:
  group: pr-asset-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: post-preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt update && sudo apt install -y webp

      - name: Find changed assets
        id: changed
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'assets/**/*.png' > /tmp/changed.txt
          echo "count=$(wc -l < /tmp/changed.txt)" >> "$GITHUB_OUTPUT"
          cat /tmp/changed.txt

      - name: Pull LFS objects
        if: steps.changed.outputs.count != '0'
        run: |
          git config lfs.url "https://volley:${{ secrets.LFS_UPLOAD_KEY }}@volley-lfs-proxy.volcanoem.workers.dev"
          git lfs pull --include="assets/**"

      - name: Generate previews
        if: steps.changed.outputs.count != '0'
        run: |
          mkdir -p /tmp/previews

          while read -r file; do
            name=$(basename "$file" .png)
            cwebp -q 80 -m 6 -mt "$file" -o "/tmp/previews/${name}.webp"
          done < /tmp/changed.txt

      - name: Post preview comment
        if: steps.changed.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="**Changed assets:**"
          while read -r file; do
            body="${body}\n- \`${file}\`"
          done < /tmp/changed.txt

          comment_id=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("Changed assets:")) | .id' | head -1)

          if [ -n "$comment_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$comment_id" -X PATCH \
              -f body="$body"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$body"
          fi