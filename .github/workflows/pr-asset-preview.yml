name: PR asset preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "assets/**"

concurrency:
  group: pr-asset-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: post-preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt update && sudo apt install -y webp

      - name: Find changed assets
        id: changed
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'assets/**/*.png' > /tmp/changed.txt
          echo "count=$(wc -l < /tmp/changed.txt)" >> "$GITHUB_OUTPUT"

      - name: Pull LFS objects
        if: steps.changed.outputs.count != '0'
        run: |
          git config lfs.url "https://volley:${{ secrets.LFS_UPLOAD_KEY }}@volley-lfs-proxy.volcanoem.workers.dev"
          git lfs pull --include="assets/**"

      - name: Generate and upload previews
        if: steps.changed.outputs.count != '0'
        run: |
          while read -r file; do
            name=$(basename "$file" .png)
            webp="/tmp/${name}.webp"
            cwebp -q 80 -m 6 -mt "$file" -o "$webp" -quiet

            key="pr-previews/${{ github.event.pull_request.number }}/${name}.webp"
            curl -sSf -X PUT \
              -H "Authorization: Basic $(echo -n "volley:${{ secrets.LFS_UPLOAD_KEY }}" | base64 -w0)" \
              -H "Content-Type: image/webp" \
              --data-binary "@${webp}" \
              "https://volley-lfs-proxy.volcanoem.workers.dev/${key}"
          done < /tmp/changed.txt

      - name: Post previews on files
        if: steps.changed.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          commit_id=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" --jq '.head.sha')

          while read -r file; do
            name=$(basename "$file" .png)
            key="pr-previews/${{ github.event.pull_request.number }}/${name}.webp"
            url="https://volley-lfs-proxy.volcanoem.workers.dev/${key}"

            body="**\`${file}\`**"$'\n'"![${name}](${url})"

            gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" \
              -F commit_id="$commit_id" \
              -F path="$file" \
              -F body="$body" \
              -F subject_type=file
          done < /tmp/changed.txt