name: Approval Gate

# Do not add `pull_request_review_thread`: it is a webhook event, not a valid
# Actions trigger, and GitHub silently rejects the whole workflow file.
on:
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to re-gate
        required: true
        type: string
  pull_request_target:
    types: [opened, reopened, labeled, unlabeled, synchronize]
  # merge_group: without it the Approval Gate checks never appear on the
  # queue's integration commit and the merge stalls.
  merge_group:

permissions:
  contents: read

# `Human Approved` must be a workflow job: the merge queue matches required
# checks by job name and ignores github-script-posted check-runs (SH-159).

concurrency:
  group: approval-gate-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.event.inputs.pr }}
  cancel-in-progress: false

jobs:
  gate:
    name: Post approval checks
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    # Run on the human verdict labels (approved-human, action-required-human) and
    # on synchronize/open/reopen/merge_group/dispatch; skip other label churn.
    if: >-
      github.event_name != 'pull_request_target' ||
      (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
      github.event.label.name == 'approved-human' ||
      github.event.label.name == 'action-required-human'
    steps:
      - name: Strip human verdict labels on new commits
        if: github.event_name == 'pull_request_target' && github.event.action == 'synchronize'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // A new push invalidates both human verdict labels, so Josh
            // re-verdicts on the next run.
            const pr = context.payload.pull_request;
            const current = new Set(pr.labels.map(label => label.name));
            for (const name of ['approved-human', 'action-required-human']) {
              if (!current.has(name)) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name,
                });
                core.info(`Removed ${name} on synchronize.`);
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

      - name: Enforce mutual exclusion between human verdict labels
        if: github.event_name == 'pull_request_target' && github.event.action == 'labeled' && (github.event.label.name == 'approved-human' || github.event.label.name == 'action-required-human')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // approved-human and action-required-human are mutually exclusive;
            // the just-applied label wins and the other strips.
            const applied = context.payload.label.name;
            const other = applied === 'approved-human'
              ? 'action-required-human'
              : 'approved-human';
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: other,
              });
              core.info(`${applied} applied; stripped conflicting ${other}.`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`${other} not present; nothing to strip.`);
              } else {
                throw error;
              }
            }

  human-approved:
    name: Human Approved
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: gate
    permissions:
      contents: read
      pull-requests: read
    if: >-
      github.event_name != 'pull_request_target' ||
      (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
      github.event.label.name == 'approved-human' ||
      github.event.label.name == 'action-required-human'
    steps:
      - name: Evaluate human verdict labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_MERGE_REF: ${{ github.event.merge_group.head_ref }}
          GH_INPUT_PR: ${{ github.event.inputs.pr }}
        with:
          script: |
            // Derive the PR number from the event; merge_group carries it in
            // head_ref as .../gh-readonly-queue/main/pr-123-<sha>.
            let number = null;
            if (context.payload.pull_request) {
              number = context.payload.pull_request.number;
            } else if (context.payload.merge_group) {
              const ref = process.env.GH_MERGE_REF || '';
              const match = ref.match(/pr-(\d+)-/);
              if (match) {
                number = Number(match[1]);
              }
            } else if (process.env.GH_INPUT_PR) {
              number = Number(process.env.GH_INPUT_PR);
            }

            if (!number) {
              core.warning('No PR number in payload; cannot evaluate approval.');
              core.setFailed('No PR number in payload.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
            });
            const labels = new Set(pr.labels.map(label => label.name));

            // action-required-human blocks even if approved-human coexists;
            // race safety net behind the gate job's mutual-exclusion step.
            if (labels.has('action-required-human')) {
              core.setFailed(
                'Changes requested: address Josh\'s comments and push a fix. ' +
                'The label strips automatically on the next push.',
              );
              return;
            }

            if (labels.has('approved-human')) {
              core.notice('Josh signed off: approved-human label present.');
              return;
            }

            // On synchronize the gate job already stripped approved-human, so
            // report "approval withdrawn" distinctly from "never approved".
            if (context.payload.pull_request &&
                context.payload.action === 'synchronize') {
              core.warning(
                'Approval withdrawn: approved-human was removed after a new commit. ' +
                'Re-apply the label after re-reviewing.',
              );
            } else {
              core.warning(
                'Needs human review: apply the `approved-human` label once you have reviewed the PR.',
              );
            }
            core.setFailed('approved-human label not present on PR.');

  verify-sender:
    name: Strip restricted label if applied by unauthorised actor
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'approved-human' ||
       github.event.label.name == 'action-required-human')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check sender and strip label if unauthorised
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MAINTAINER: J-Melon
        with:
          script: |
            // approved-human / action-required-human are Josh-only (both
            // sides of the human verdict; SH-179).
            const labelName = context.payload.label.name;
            const maintainer = process.env.MAINTAINER;
            const policy = {
              'approved-human': new Set([maintainer]),
              'action-required-human': new Set([maintainer]),
            };
            const allowed = policy[labelName];
            if (!allowed) {
              core.info(`No policy for ${labelName}; leaving it alone.`);
              return;
            }
            const actor = context.payload.sender && context.payload.sender.login;
            if (allowed.has(actor)) {
              core.info(`${labelName} applied by ${actor}; keeping.`);
              return;
            }
            core.warning(`${labelName} applied by ${actor}; removing.`);
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: labelName,
            });
            const allowedList = Array.from(allowed).map(u => `@${u}`).join(' or ');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `The \`${labelName}\` label is reserved for ${allowedList}. Removing the label applied by @${actor}.`,
            });
